  <circle cx="1000" cy="315" r="64" fill="url(#goldChip)" stroke="#7a5d12" stroke-width="2"/>
  <circle cx="1000" cy="315" r="48" fill="none" stroke="#0a0e0c" stroke-width="2" stroke-dasharray="6 6" opacity="0.45"/>
